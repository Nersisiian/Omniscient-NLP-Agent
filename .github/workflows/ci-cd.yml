name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build and run
        run: |
          docker compose up --build -d

      - name: Wait
        run: sleep 15

      - name: Test
        run: |
          docker compose run backend pytest tests/

      - name: Down
        run: docker compose down
